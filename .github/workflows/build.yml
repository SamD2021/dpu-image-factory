---
name: Build container images

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-images:
    name: ${{ matrix.image_name }} (${{ matrix.platform }})
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: dpu-sim-control-plane
            image_target: dpu-sim-control-plane
            platform: amd64
          - image_name: dpu-sim-control-plane
            image_target: dpu-sim-control-plane
            platform: arm64
          - image_name: dpu-sim-worker
            image_target: dpu-sim-worker
            platform: amd64
          - image_name: dpu-sim-worker
            image_target: dpu-sim-worker
            platform: arm64
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.image_name }}
      image-target: ${{ matrix.image_target }}
      platform: ${{ matrix.platform }}
      default-tag: latest
    secrets: inherit

  merge-container-manifests:
    name: Merge multi-arch manifests
    needs: build-images
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: none
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      DEFAULT_TAG: latest
    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Publish multi-arch tags
        run: |
          set -euo pipefail
          date_tag="$(date -u +%Y%m%d)"
          images=(dpu-sim-control-plane dpu-sim-worker)
          tag_bases=("${DEFAULT_TAG}" "${DEFAULT_TAG}.${date_tag}" "${date_tag}")

          for image in "${images[@]}"; do
            repo="${IMAGE_REGISTRY}/${image}"
            for base in "${tag_bases[@]}"; do
              manifest_ref="${repo}:${base}"
              amd_ref="docker://${repo}:${base}-amd64"
              arm_ref="docker://${repo}:${base}-arm64"

              buildah manifest rm "${manifest_ref}" >/dev/null 2>&1 || true
              buildah manifest create "${manifest_ref}"
              buildah manifest add --arch amd64 "${manifest_ref}" "${amd_ref}"
              buildah manifest add --arch arm64 "${manifest_ref}" "${arm_ref}"
              buildah manifest push --all "${manifest_ref}" "docker://${manifest_ref}"
              buildah manifest rm "${manifest_ref}" >/dev/null 2>&1 || true
            done
          done

  build-qcow2:
    name: Build and publish qcow2 (${{ matrix.image_name }} / ${{ matrix.platform }})
    needs: build-images
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: dpu-sim-control-plane
            image_target: dpu-sim-control-plane
            platform: amd64
          - image_name: dpu-sim-control-plane
            image_target: dpu-sim-control-plane
            platform: arm64
          - image_name: dpu-sim-worker
            image_target: dpu-sim-worker
            platform: amd64
          - image_name: dpu-sim-worker
            image_target: dpu-sim-worker
            platform: arm64
    permissions:
      contents: read
      packages: write
      id-token: none
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      DEFAULT_TAG: latest
    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build qcow2 image
        id: bib
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: quay.io/centos-bootc/bootc-image-builder:latest
          config-file: ./disk_config/disk.toml
          image: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:${{ env.DEFAULT_TAG }}-${{ matrix.platform }}
          types: qcow2
          additional-args: --use-librepo=True --rootfs=btrfs

      - name: Locate qcow2 output
        id: qcow2
        run: |
          set -euo pipefail
          qcow2_path="$(find "${{ steps.bib.outputs.output-directory }}" -type f -name '*.qcow2' | head -n1)"
          if [[ -z "${qcow2_path}" ]]; then
            echo "qcow2 output not found" >&2
            exit 1
          fi
          echo "path=${qcow2_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload qcow2 as workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.image_name }}-qcow2-${{ matrix.platform }}
          path: ${{ steps.qcow2.outputs.path }}
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: true

      - name: Setup ORAS
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push qcow2 artifact to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euo pipefail
          ref_base="${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}-qcow2"
          date_tag="$(date -u +%Y%m%d)"
          sha_tag="${GITHUB_SHA::12}"
          oras push \
            "${ref_base}:${{ env.DEFAULT_TAG }}-${{ matrix.platform }}" \
            --artifact-type application/vnd.dpu-sim.qcow2.v1 \
            "${{ steps.qcow2.outputs.path }}:application/x-qemu-disk"
          oras copy "${ref_base}:${{ env.DEFAULT_TAG }}-${{ matrix.platform }}" "${ref_base}:${date_tag}-${{ matrix.platform }}"
          oras copy "${ref_base}:${{ env.DEFAULT_TAG }}-${{ matrix.platform }}" "${ref_base}:sha-${sha_tag}-${{ matrix.platform }}"

  cleanup-qcow2-tags:
    name: Cleanup old qcow2 tags (${{ matrix.package_name }})
    needs: build-qcow2
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - dpu-sim-control-plane-qcow2
          - dpu-sim-worker-qcow2
    permissions:
      contents: read
      packages: write
      id-token: none
    env:
      KEEP_COUNT: "14"
    steps:
      - name: Prune old date/sha qcow2 tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          set -euo pipefail

          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            api_base="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}"
          else
            api_base="/users/${OWNER}/packages/container/${PACKAGE_NAME}"
          fi

          tmp_json="$(mktemp)"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/versions?per_page=100" > "${tmp_json}"

          mapfile -t delete_ids < <(
            jq -r --argjson keep "${KEEP_COUNT}" '
              [
                .[]
                | {
                    id,
                    created_at,
                    tags: (.metadata.container.tags // [])
                  }
                | select((.tags | any(test("^latest-(amd64|arm64)$"))) | not)
                | select(.tags | any(test("^(sha-[0-9a-f]{12}-(amd64|arm64)|[0-9]{8}-(amd64|arm64))$")))
              ]
              | sort_by(.created_at)
              | reverse
              | .[$keep:]
              | .[].id
            ' "${tmp_json}"
          )

          if [[ "${#delete_ids[@]}" -eq 0 ]]; then
            echo "No old qcow2 versions to delete for ${PACKAGE_NAME}."
            exit 0
          fi

          for id in "${delete_ids[@]}"; do
            echo "Deleting ${PACKAGE_NAME} version id: ${id}"
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "${api_base}/versions/${id}"
          done
